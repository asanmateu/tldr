codecov:
  require_ci_to_pass: true

coverage:
  status:
    project:
      default:
        target: 85%
    patch:
      default:
        target: 80%

ignore:
  - "src/lib/providers/**"
  - "src/lib/ThemeContext.tsx"
  - "src/extractors/notion.ts"
  - "src/extractors/slack.ts"
  - "src/extractors/youtube.ts"
